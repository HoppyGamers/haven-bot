services:
  haven-bot:
    image: ghcr.io/hoppygamers/haven-bot:latest
    container_name: haven-bot
    restart: unless-stopped

    # Load all configuration from .env file
    env_file:
      - .env

    volumes:
      # Persist the database across container restarts and updates.
      # The DB_PATH env var points here automatically.
      - haven_data:/data

    ports:
      # Callback server — Haven POSTs slash command events here.
      # Must match the port in your CALLBACK_URL env var.
      # Haven uses ports 3000 and 3001 internally — using 3002 to avoid conflicts.
      - "3002:3002"

      # Web dashboard — access at http://your-server:3003
      # Only exposed when DASHBOARD_SECRET is set in .env
      # Remove or comment out if you don't want the dashboard accessible externally.
      - "3003:3003"

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  haven_data:
    driver: local
