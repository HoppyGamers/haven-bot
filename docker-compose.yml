version: '3.8'

services:
  haven-bot:
    build: .
    image: haven-bot:latest
    container_name: haven-bot
    restart: unless-stopped

    # Load all configuration from .env file
    env_file:
      - .env

    volumes:
      # Persist the database across container restarts and updates.
      # The DB_PATH env var in the Dockerfile points here automatically.
      - haven_data:/data

    ports:
      # Expose the callback server so Haven can POST slash command events.
      # Change the left side (host port) if 3000 is already in use.
      # Must match the port in your CALLBACK_URL env var.
      - "3000:3000"

    # Limit resource usage to prevent a runaway process from affecting the host
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

    # Log rotation — keeps logs from filling up disk on long-running servers
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  haven_data:
    driver: local
